apiVersion: apps/v1
kind: Deployment
metadata:
  name: chainclone-backend
  namespace: chainclone
  labels:
    app: chainclone-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: chainclone-backend
  template:
    metadata:
      labels:
        app: chainclone-backend
    spec:
      containers:
        - name: chainclone-backend
          image: opsalis/chainclone-backend:latest
          ports:
            - containerPort: 3300
              protocol: TCP
          env:
            - name: PORT
              value: "3300"
            - name: NODE_ENV
              value: "production"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3300
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 3300
            initialDelaySeconds: 5
            periodSeconds: 10
      restartPolicy: Always
